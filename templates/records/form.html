{% extends "base.html" %}
{% block title %}{{ mode }} record - MyRecs{% endblock %}

{% block content %}
<section class="form-shell">
  <div>
    <p class="eyebrow">{{ mode }} record</p>
    <h1>{{ mode }} buyer record</h1>
    <p class="muted wide">Keep each transaction structured with buyer, product, value, status, and operational notes.</p>
  </div>

  <form class="panel record-form" method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <label>
      Buyer name
      <input name="buyer_name" type="text" value="{{ record.buyer_name or '' }}" minlength="2" required>
    </label>
    <label>
      Product name
      <input name="product_name" type="text" value="{{ record.product_name or '' }}" minlength="2" required>
    </label>
    <div class="form-grid">
      <label>
        Quantity
        <input name="quantity" type="number" min="1" step="1" value="{{ record.quantity or '' }}" required>
      </label>
      <label>
        Unit price
        <input name="unit_price" type="number" min="0" step="0.01" value="{{ record.unit_price or (record.unit_price_cents|default(0)|money if record.unit_price_cents is defined else '') }}" required>
      </label>
    </div>
    <label>
      Status
      <select name="status">
        {% for option in ["open", "paid", "cancelled"] %}
          <option value="{{ option }}" {% if (record.status or "open") == option %}selected{% endif %}>{{ option|capitalize }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Notes
      <textarea name="notes" rows="4">{{ record.notes or '' }}</textarea>
    </label>
    <div class="form-actions">
      <a class="button button-ghost" href="{{ url_for('records.dashboard') }}">Cancel</a>
      <button class="button button-primary" type="submit">{{ mode }} record</button>
    </div>
  </form>
</section>
{% endblock %}
